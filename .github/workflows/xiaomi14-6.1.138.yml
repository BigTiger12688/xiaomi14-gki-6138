name: Xiaomi 14 Android14 6.1.138 Build

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      kernelsu_ref:
        description: "KernelSU/SukiSU tag 或 commit，默认 v4.1.3"
        required: false
        type: string
        default: "v4.1.3"
      susfs_ref:
        description: "SUSFS commit/tag，可留空使用分支最新"
        required: false
        type: string
        default: ""

env:
  PYTHON_VERSION: "3.10"
  GKI_WORKSPACE: "/tmp/gki-build"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-large-packages: "true"
          remove-swapfile: "true"
          verbose: "true"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ccache git curl wget zip unzip xz-utils openssl rsync patch

      - name: Configure ccache
        run: |
          mkdir -p ~/.cache/bazel ~/.ccache
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> "$GITHUB_ENV"

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: xiaomi14-6138-ccache-${{ github.sha }}
          restore-keys: |
            xiaomi14-6138-ccache-

      - name: Setup AVB signing key
        env:
          BOOT_SIGN_KEY: ${{ secrets.BOOT_SIGN_KEY }}
        run: |
          if [ -n "$BOOT_SIGN_KEY" ]; then
            mkdir -p "$RUNNER_TEMP/keys"
            printf "%s" "$BOOT_SIGN_KEY" > "$RUNNER_TEMP/keys/testkey.pem"
            echo "BOOT_SIGN_KEY_PATH=$RUNNER_TEMP/keys/testkey.pem" >> "$GITHUB_ENV"
          fi

      - name: Build Xiaomi 14 preset
        run: |
          python3 ./.github/workflows/scripts/xiaomi14_builder.py \
            --workspace "${{ env.GKI_WORKSPACE }}" \
            --kernelsu-ref "${{ github.event.inputs.kernelsu_ref }}" \
            --susfs-ref "${{ github.event.inputs.susfs_ref }}"

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp -r "${{ env.GKI_WORKSPACE }}/android14-6.1-138/out/." artifacts/
          ls -la artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: xiaomi14-android14-6.1.138
          path: artifacts/*
          if-no-files-found: error
